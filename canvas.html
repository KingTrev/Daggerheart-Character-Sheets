<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Canvas — Daggerheart</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080909;--bg2:#0e1012;--bg3:#151719;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.16);
  --text:#e8e3d8;--muted:#7a7570;
  --gold:#c9a84c;--gold-dim:#7a6530;--gold-faint:#141008;
  --red:#c04040;--red-dim:#7a2828;--red-faint:#120808;
  --teal:#3a8a80;--teal-dim:#2a6a60;--teal-faint:#081210;
  --blue:#4a7ab0;--blue-faint:#080f18;
  --purple:#7a5ab0;--purple-faint:#0e0818;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;user-select:none;}

/* ── TOOLBAR ── */
.toolbar{height:46px;background:var(--bg2);border-bottom:1px solid var(--border2);display:flex;align-items:center;padding:0 12px;gap:7px;flex-shrink:0;}
.brand{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:0.16em;color:var(--gold);white-space:nowrap;}
.tb-div{width:1px;height:24px;background:var(--border2);flex-shrink:0;}
.tb-btn{font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.1em;background:var(--bg3);border:1px solid var(--border2);color:var(--muted);padding:5px 10px;border-radius:4px;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;transition:all 0.12s;}
.tb-btn:hover{color:var(--text);}
.tb-btn.active{color:var(--teal);border-color:var(--teal-dim);background:var(--teal-faint);}
.color-btn{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;transition:all 0.1s;}
.color-btn.active{border-color:white;transform:scale(1.2);}
.tb-spacer{flex:1;}
.tb-hint{font-family:'Cinzel',serif;font-size:7px;letter-spacing:0.07em;color:var(--muted);}
.tb-link{font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.09em;color:var(--muted);text-decoration:none;padding:5px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;}
.tb-link:hover{color:var(--text);}

/* ── CANVAS WRAP ── */
#canvas-wrap{flex:1;position:relative;overflow:hidden;cursor:default;}
#canvas-wrap.panning{cursor:grab;}
#canvas-wrap.panning:active{cursor:grabbing;}

/* ── CANVAS ── */
#canvas{
  position:absolute;top:0;left:0;
  width:6000px;height:6000px;
  transform-origin:0 0;
}
/* Dot grid */
#canvas::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,0.055) 1px,transparent 1px);
  background-size:30px 30px;
  pointer-events:none;
}

/* ── SVG LAYERS ── */
#connections-svg,#preview-svg{
  position:absolute;top:0;left:0;
  width:6000px;height:6000px;
  pointer-events:none;overflow:visible;
}
#connections-svg{pointer-events:visibleStroke;}
.conn-line{
  stroke:rgba(255,255,255,0.18);stroke-width:1.8;fill:none;
  stroke-dasharray:7 4;
  cursor:pointer;pointer-events:stroke;
  transition:stroke 0.15s;
}
.conn-line:hover{stroke:var(--red);stroke-width:2.5;}
.preview-line{stroke:var(--teal);stroke-width:1.5;fill:none;stroke-dasharray:8 4;opacity:0.8;}

/* ── NOTES ── */
.note{
  position:absolute;min-width:180px;border-radius:6px;
  border:1px solid var(--border2);
  display:flex;flex-direction:column;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
  transition:box-shadow 0.15s,border-color 0.15s;
}
.note:hover{box-shadow:0 6px 28px rgba(0,0,0,0.7);}
.note.selected{border-color:var(--gold-dim)!important;}
.note.connecting-source{border-color:var(--teal-dim)!important;box-shadow:0 0 0 2px var(--teal),0 6px 28px rgba(0,0,0,0.7)!important;}

.note-header{
  padding:6px 8px;display:flex;align-items:center;gap:5px;
  cursor:move;border-radius:5px 5px 0 0;flex-shrink:0;
}
.note-title{
  font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:0.1em;
  flex:1;background:none;border:none;outline:none;color:inherit;
  cursor:text;min-width:0;
}
.note-title::placeholder{opacity:0.45;}
.note-del{background:none;border:none;color:inherit;opacity:0.35;cursor:pointer;font-size:15px;line-height:1;padding:0;flex-shrink:0;}
.note-del:hover{opacity:1;}
.note-connect-btn{
  background:none;border:1px solid rgba(255,255,255,0.18);border-radius:3px;
  color:inherit;opacity:0.45;cursor:pointer;font-size:9px;padding:1px 6px;line-height:1.5;flex-shrink:0;
}
.note-connect-btn:hover{opacity:1;background:rgba(255,255,255,0.08);}

.note-body{padding:5px 8px 8px;flex:1;}
.note-text{
  width:100%;font-family:'Crimson Pro',serif;font-size:13px;line-height:1.6;
  background:none;border:none;outline:none;color:inherit;resize:none;
  min-height:55px;cursor:text;display:block;
}
.note-text::placeholder{opacity:0.35;}
.note-resize{position:absolute;bottom:3px;right:3px;width:12px;height:12px;cursor:se-resize;opacity:0.25;font-size:10px;line-height:1;}
.note-resize:hover{opacity:0.7;}

/* Color variants */
.note.c-gold{background:linear-gradient(150deg,#1a1508 0%,#0e0a02 100%);border-color:var(--gold-dim);}
.note.c-gold .note-header{background:rgba(201,168,76,0.08);color:var(--gold);}
.note.c-gold .note-text{color:#d4c08a;}

.note.c-red{background:linear-gradient(150deg,#180909 0%,#0e0404 100%);border-color:var(--red-dim);}
.note.c-red .note-header{background:rgba(192,64,64,0.08);color:var(--red);}
.note.c-red .note-text{color:#d4a0a0;}

.note.c-teal{background:linear-gradient(150deg,#091412 0%,#050e0b 100%);border-color:var(--teal-dim);}
.note.c-teal .note-header{background:rgba(58,138,128,0.08);color:var(--teal);}
.note.c-teal .note-text{color:#90cac5;}

.note.c-blue{background:linear-gradient(150deg,#090f18 0%,#050a10 100%);border-color:#2a4a70;}
.note.c-blue .note-header{background:rgba(74,122,176,0.08);color:var(--blue);}
.note.c-blue .note-text{color:#90b0d4;}

.note.c-purple{background:linear-gradient(150deg,#0f0918 0%,#080510 100%);border-color:#4a3a70;}
.note.c-purple .note-header{background:rgba(122,90,176,0.08);color:var(--purple);}
.note.c-purple .note-text{color:#b0a0d4;}

.note.c-dark{background:linear-gradient(150deg,#141618 0%,#0a0c0d 100%);border-color:var(--border2);}
.note.c-dark .note-header{background:rgba(255,255,255,0.04);color:var(--muted);}
.note.c-dark .note-text{color:var(--text);}

/* ── LABELS ── */
.label{position:absolute;cursor:move;padding:3px;}
.label-inp{
  font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:0.14em;
  background:none;border:none;outline:none;cursor:text;
  text-transform:uppercase;min-width:60px;
}
.label-inp:focus{opacity:1;}

/* ── CONNECT BANNER ── */
#connect-banner{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.12em;
  color:var(--teal);background:var(--teal-faint);border:1px solid var(--teal-dim);
  padding:7px 18px;border-radius:4px;display:none;z-index:200;
  pointer-events:none;white-space:nowrap;
}

/* ── MINIMAP ── */
#minimap{
  position:absolute;bottom:12px;right:12px;
  width:150px;height:90px;
  background:rgba(14,16,18,0.88);border:1px solid var(--border2);
  border-radius:4px;overflow:hidden;pointer-events:none;
}
#minimap-viewport{
  position:absolute;border:1px solid var(--gold-dim);
  background:rgba(201,168,76,0.06);border-radius:2px;
}

/* ── ZOOM INDICATOR ── */
#zoom-indicator{
  position:absolute;bottom:14px;left:12px;
  font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.1em;color:var(--muted);
  background:rgba(14,16,18,0.85);border:1px solid var(--border);
  padding:4px 9px;border-radius:4px;pointer-events:none;
}

/* ── CONTEXT MENU ── */
#ctx-menu{
  position:fixed;background:var(--bg2);border:1px solid var(--border2);
  border-radius:6px;padding:4px;z-index:9999;display:none;min-width:148px;
  box-shadow:0 8px 24px rgba(0,0,0,0.65);
}
.ctx-item{
  font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.08em;color:var(--muted);
  padding:6px 10px;border-radius:3px;cursor:pointer;white-space:nowrap;
}
.ctx-item:hover{background:var(--bg3);color:var(--text);}
.ctx-div{height:1px;background:var(--border);margin:3px 0;}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="brand">⚔ GM CANVAS</div>
  <div class="tb-div"></div>

  <button class="tb-btn" onclick="addNote()">✦ Note</button>
  <button class="tb-btn" onclick="addLabel()">T Label</button>

  <div class="tb-div"></div>

  <div style="display:flex;gap:4px;align-items:center;">
    <div class="color-btn active" id="cb-gold"   style="background:#7a6530;" onclick="setColor('gold')"   title="Gold — Story"></div>
    <div class="color-btn"        id="cb-red"    style="background:#7a2828;" onclick="setColor('red')"    title="Red — Danger"></div>
    <div class="color-btn"        id="cb-teal"   style="background:#3a8a80;" onclick="setColor('teal')"   title="Teal — NPC"></div>
    <div class="color-btn"        id="cb-blue"   style="background:#4a7ab0;" onclick="setColor('blue')"   title="Blue — Location"></div>
    <div class="color-btn"        id="cb-purple" style="background:#7a5ab0;" onclick="setColor('purple')" title="Purple — Mystery"></div>
    <div class="color-btn"        id="cb-dark"   style="background:#2a2d30;" onclick="setColor('dark')"   title="Dark — General"></div>
  </div>

  <div class="tb-div"></div>

  <button class="tb-btn" id="connect-btn" onclick="toggleConnectMode()">⟶ Connect</button>
  <button class="tb-btn" onclick="clearConnections()">✕ Lines</button>

  <div class="tb-div"></div>

  <button class="tb-btn" onclick="resetView()">⌖ Reset</button>
  <button class="tb-btn" onclick="clearAll()" style="color:var(--red-dim);">⚠ Clear</button>

  <div class="tb-spacer"></div>
  <div class="tb-hint">Drag header to move · Scroll to zoom · Right-click for options · ⟶ to connect notes</div>
  <div class="tb-div"></div>
  <a class="tb-link" href="dm.html">← GM Screen</a>
  <a class="tb-link" href="index.html">🏠 Home</a>
</div>

<!-- CANVAS -->
<div id="canvas-wrap">
  <div id="canvas">
    <svg id="connections-svg">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
          <polygon points="0 0, 8 3.5, 0 7" fill="rgba(255,255,255,0.25)"/>
        </marker>
      </defs>
    </svg>
    <svg id="preview-svg">
      <line class="preview-line" id="preview-line" x1="0" y1="0" x2="0" y2="0" style="display:none;"/>
    </svg>
  </div>

  <!-- Connect mode banner -->
  <div id="connect-banner">CONNECT MODE — Click a note to start a connection</div>

  <!-- Minimap -->
  <div id="minimap"><div id="minimap-viewport"></div></div>

  <!-- Zoom -->
  <div id="zoom-indicator">100%</div>
</div>

<!-- CONTEXT MENU -->
<div id="ctx-menu">
  <div class="ctx-item" onclick="ctxAddNote()">✦ Add Note Here</div>
  <div class="ctx-item" onclick="ctxAddLabel()">T Add Label Here</div>
  <div id="ctx-node-actions">
    <div class="ctx-div"></div>
    <div class="ctx-item" onclick="ctxConnect()">⟶ Connect This</div>
    <div class="ctx-div"></div>
    <div class="ctx-item" onclick="ctxSetColor('gold')"   style="color:var(--gold);">● Gold</div>
    <div class="ctx-item" onclick="ctxSetColor('red')"    style="color:var(--red);">● Red</div>
    <div class="ctx-item" onclick="ctxSetColor('teal')"   style="color:var(--teal);">● Teal</div>
    <div class="ctx-item" onclick="ctxSetColor('blue')"   style="color:var(--blue);">● Blue</div>
    <div class="ctx-item" onclick="ctxSetColor('purple')" style="color:var(--purple);">● Purple</div>
    <div class="ctx-item" onclick="ctxSetColor('dark')"   style="color:var(--muted);">● Dark</div>
    <div class="ctx-div"></div>
    <div class="ctx-item" onclick="ctxDelete()" style="color:var(--red);">✕ Delete</div>
  </div>
</div>

<!-- SCRIPTS -->
<script src="canvas-core.js"></script>
<script src="canvas-render.js"></script>
<script>
// Expose globals needed by render
const canvas  = document.getElementById('canvas');
const wrap    = document.getElementById('canvas-wrap');
const svg     = document.getElementById('connections-svg');
const previewLine = document.getElementById('preview-line');

// Boot
setupPan();
setupZoom();
loadData();
</script>
</body>
</html>
